<!DOCTYPE html>
<html>
<head>
    <title>NEXUS | Dashboard</title>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: sans-serif; padding: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 10px; border-left: 5px solid #5865F2; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Welcome, {{ user.name }}!</h1>
    <div class="card">
        <h3>Server Stats</h3>
        <p>Connected Servers: {{ guilds }}</p>
        <p>Total Users: {{ users }}</p>
        <p>Status: <span style="color: #43b581;">ONLINE</span></p>
    </div>
</body>
</html>
